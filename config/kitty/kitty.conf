# --- Fonts ---
font_family      JetBrainsMono NF Bold
font_size        13.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# Add some nice vertical breathing room between lines
modify_font cell_height 115%

# --- Window Aesthetics & Padding ---
window_padding_width 15 20
hide_window_decorations yes
confirm_os_window_close 0
sync_to_monitor yes
background_opacity 0.75
dynamic_background_opacity yes

# Adds a small gap between terminal splits
window_margin_width 4

# --- Animations & Cursor ---
# Using a beam cursor that blinks, and a super smooth trail effect
cursor_shape beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# Ghost's custom gliding cursor trail
# 1 enables the trail, decay controls the duration of the fade, limit controls number of segments
cursor_trail 1
cursor_trail_decay 0.1 0.55
cursor_trail_limit 300

# --- Tab Bar Aesthetics ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_align center
active_tab_font_style   bold-italic
inactive_tab_font_style normal
tab_bar_min_tabs 2

# Tab colors integrated with Ghost's neon palette
active_tab_foreground   #15161E
active_tab_background   #7dcfff
inactive_tab_foreground #a9b1d6
inactive_tab_background #282C34
tab_bar_background      #15161E

# --- Mouse & URL Behavior ---
url_style curly
url_color #f7768e
detect_urls yes
show_hyperlink_targets yes
copy_on_select yes
default_pointer_shape beam
pointer_shape_when_grabbed hand
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

# --- Keybinds for Window Splitting (Tiling inside Kitty!) ---
# These let you run multiple terminals inside a single Kitty window
map ctrl+shift+enter new_window_with_cwd
map ctrl+alt+left    neighboring_window left
map ctrl+alt+right   neighboring_window right
map ctrl+alt+up      neighboring_window up
map ctrl+alt+down    neighboring_window down
map ctrl+l combine : clear_terminal scrollback active : send_text normal,application \x0c

# --- Performance & Misc ---
scrollback_lines 10000
enable_audio_bell no
linux_display_server wayland

# --- Color Scheme (Neon Ghost Theme) ---
# Pulled from your dashboard variables for perfect cohesion
foreground            #c0caf5
background            #15161E
selection_foreground  #15161E
selection_background  #7dcfff

