# APPLIACTIONS BLUR
windowrule = no_blur on, match:class ^(multimedia_video)$
windowrule = opacity 1.0 1.0, match:class ^(multimedia_video)$
windowrule = opacity 0.95 0.55, match:class ^(settings)$
windowrule = opacity 0.95 0.55, match:class ^(org.gnome.Nautilus)$
windowrule = opacity 0.95 0.60, match:class ^(gedit|org.gnome.TextEditor|mousepad)$
windowrule = opacity 0.95 0.60, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.92 0.55, match:class ^(kitty)$
windowrule = opacity 0.95 0.55, match:class ^(discord|vesktop|org.telegram.desktop)$
windowrule = opacity 0.92 0.55, match:class ^(Spotify)$
windowrule = opacity 0.98 0.60, match:class ^(zen)$
#windowrule = opacity 0.8, match:class ^(viewer)$

# LAYER RULES
#layerrule = blur on, match:namespace rofi
#layerrule = ignore_alpha 0, match:namespace rofi
#layerrule = ignore_alpha 0.5, match:namespace rofi
#layerrule = dimaround on, match:namespace rofi
#layerrule = animation popin 10%, match:namespace rofi
#layerrule = blur on, match:namespace notifications
#layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur on, match:namespace waybar
#layerrule = ignore_alpha 0, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace notif
layerrule = blur on, match:namespace logout_dialog

# SWAYNC BLUR & XRAY
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
layerrule = xray 0, match:namespace swaync-control-center
layerrule = xray 0, match:namespace swaync-notification-window

#FLOAT
windowrule = float on, match:class ^(settings)$
windowrule = float on, match:class ^(viewer)$
windowrule = float on, match:class ^(multimedia_video)$
windowrule = size 900 506, match:class ^(multimedia_video)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = size 50% 60%, match:class ^(org.pulseaudio.pavucontrol)$

# Ignore maximize requests from apps.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# POP UPS AND DIALOGUES
windowrule = float on, match:title ^(Save As|Save a File|Pick Files)$
windowrule = size 50% 60%, match:title ^(Save As|Save a File|Pick Files)$
windowrule = center on, match:title ^(Save As|Save a File|Pick Files)$

windowrule = float on, match:initial_title ^(Open Files)$
windowrule = size 70% 60%, match:initial_title ^(Open Files)$

### Window rules for the terminals on desktop
windowrule = float on, match:class ^(desktop-terminal)$
windowrule = workspace 1, match:class ^(desktop-terminal)$
windowrule = size 600 400, match:class ^(desktop-terminal)$
windowrule = move 40 80, match:class ^(desktop-terminal)$
windowrule = opacity 0.95 0.55, match:class ^(desktop-terminal)$
windowrule = border_size 0, match:class ^(desktop-terminal)$

# Startup application workspace assignments
windowrule = workspace 1 silent, match:class ^(brave-browser|Brave-browser)$
windowrule = workspace 2 silent, match:class ^(Spotify)$
windowrule = workspace 6 silent, match:class ^(whatsapp-linux-app)$
