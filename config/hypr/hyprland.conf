source = colors.conf

### MONITORS ###
monitor = , preferred, auto, 1


### MY PROGRAMS ###
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


### AUTOSTART ###
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME GTK_THEME
exec-once = xsettingsd
exec-once = nm-applet
exec-once = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once = systemd-inhibit --what=handle-power-key sleep infinity
exec-once = blueman-applet
exec-once = swaync
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = awww-daemon
exec-once = awww restore
exec-once = eww --config ~/.config/eww/dashboard daemon
exec-once = swayosd-server
exec-once = python3 ~/.config/hypr/scripts/mpris_art_daemon.py
### ENVIRONMENT VARIABLES ###
# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Sweet-Dark
env = QT_QPA_PLATFORMTHEME,qt6ct


### PERMISSIONS ###
# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


### TAGS ###
# source= ~/.config/hypr/configs/tags.conf


### LOOK AND FEEL ###
source= ~/.config/hypr/configs/looknfeel.conf


### ANIMATIONS ###
source= ~/.config/hypr/configs/UserAnimations.conf

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]


### WINDOWRULES AND LAYERRULES ###
source= ~/.config/hypr/configs/windowrules.conf

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

render {
	new_render_scheduling = true
}

### INPUT ###
source= ~/.config/hypr/configs/input.conf


### KEYBINDS ###
source= ~/.config/hypr/configs/keybinds.conf



# Brightness keys are handled in configs/keybinds.conf








workspace = 1, gapsout:2 10 10 10
workspace = 2, gapsout:2 10 10 10
workspace = 3, gapsout:2 10 10 10
workspace = 4, gapsout:2 10 10 10
workspace = 5, gapsout:2 10 10 10



# QuickNote window placement rule
windowrule = float true, match:class ^(hypr.quicknote)$
windowrule = size 650 450, match:class ^(hypr.quicknote)$
windowrule = move 100%-670 60, match:class ^(hypr.quicknote)$

# WiFi Panel
windowrule = float on,          match:class ^(hypr.wifipanel)$
windowrule = size 320 480,      match:class ^(hypr.wifipanel)$
windowrule = move 100%-340 55,  match:class ^(hypr.wifipanel)$
windowrule = border_size 0,     match:class ^(hypr.wifipanel)$
windowrule = no_shadow on,      match:class ^(hypr.wifipanel)$
windowrule = pin on,            match:class ^(hypr.wifipanel)$

# Bluetooth Panel
windowrule = float on,          match:class ^(hypr.btpanel)$
windowrule = size 320 480,      match:class ^(hypr.btpanel)$
windowrule = move 100%-340 55,  match:class ^(hypr.btpanel)$
windowrule = border_size 0,     match:class ^(hypr.btpanel)$
windowrule = no_shadow on,      match:class ^(hypr.btpanel)$
windowrule = pin on,            match:class ^(hypr.btpanel)$

# QuickNote shortcut trigger
bind = SUPER, N, exec, ~/.config/hypr/scripts/notes.sh

# Spacing between topbar and windows

# Perfect window spacing

# Spacing between topbar and windows

# Perfect window spacing

# Perfect window spacing
gaps_in = 5
gaps_out = 2,10,10,10



# For the spotify album cover in the waybar

exec-once = ~/.config/waybar/scripts/spotify-art-watch.sh


############# WIDGETS #################



# --- Global Hanging Rules ---
windowrule = match:class widget_.*, float on
windowrule = match:class widget_.*, border_size 0
windowrule = match:class widget_.*, no_shadow on
windowrule = match:class widget_.*, no_initial_focus on

# --- Workspace Lock Rules ---
windowrule = match:class widget_tl, workspace 3
windowrule = match:class widget_tr, workspace 3
windowrule = match:class widget_bottom, workspace 3

# --- Staggered Placements (Your Live Coordinates) ---
# 1. Top-Left Wing (widget_tl)
windowrule = match:class widget_tl, move 32 68
windowrule = match:class widget_tl, size 690 350

# 2. Right Wing (widget_tr)
windowrule = match:class widget_tr, move 1034 63
windowrule = match:class widget_tr, size 320 300

# 3. Bottom Vertex (widget_bottom)
windowrule = match:class widget_bottom, move 32 457
windowrule = match:class widget_bottom, size 1310 300

# --- Startup Execution ---
exec-once = ~/dotfiles/scripts/launch_widgets.sh


## GTK ENV VARS ###
env = GTK_THEME,Sweet-Dark
env = GTK_ICON_THEME,Papirus-Dark
env = XCURSOR_THEME,Qogir-Light
env = XCURSOR_SIZE,26


env = QT_QPA_PLATFORMTHEME,qt5ct

# --- Ghost Desktop Mascot Rules ---
windowrule = match:title ^(ghost_mascot)$, float on
windowrule = match:title ^(ghost_mascot)$, pin on
windowrule = match:title ^(ghost_mascot)$, move 75% 55%
windowrule = match:title ^(ghost_mascot)$, border_size 0
windowrule = match:title ^(ghost_mascot)$, no_blur on
windowrule = match:title ^(ghost_mascot)$, no_shadow on
windowrule = match:title ^(ghost_mascot)$, no_initial_focus on
windowrule = match:title ^(ghost_mascot)$, no_focus on
windowrule = match:title ^(ghost_mascot)$, opacity 1.0 1.0

exec-once = python3 ~/.config/hypr/scripts/ghost_mascot.py &
